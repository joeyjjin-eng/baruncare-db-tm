<script>
/* ============================================================
   세션 확인 + 헤더 사용자명 반영
   ============================================================ */
let ME = null;
(async () => {
  try {
    const res = await fetch('../api/me.php', { credentials: 'same-origin' });
    if (res.status === 401) { location.href = '../index.html'; return; }
    const data = await res.json();
    if (!data.ok) { location.href = '../index.html'; return; }
    ME = data.data.user;
    if (ME.role !== 'admin') { alert('관리자만 접근 가능합니다.'); location.href = '../send.html'; return; }
    document.getElementById('meName').textContent   = ME.name;
    document.getElementById('meAvatar').textContent = (ME.name || '관').charAt(0);
    await render();
  } catch (_) {
    location.href = '../index.html';
  }
})();

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await fetch('../api/logout.php', { credentials: 'same-origin' }); } catch (_) {}
  location.href = '../index.html';
});

/* ============================================================
   상태 배지 매핑
   ============================================================ */
const BADGE_CLASS = {
  '알림톡전송' : 'bg-status-notify-bg text-status-notify-fg',
  '케어신청완료': 'bg-status-care-bg   text-status-care-fg',
  '매칭완료'  : 'bg-status-match-bg  text-status-match-fg',
  '정산완료'  : 'bg-status-settle-bg text-status-settle-fg',
};
function badge(label){
  const cls = BADGE_CLASS[label] || BADGE_CLASS['정산완료'];
  return `<span class="inline-flex items-center justify-center w-[140px] h-[34px] rounded-[8px] text-[14px] font-medium ${cls}">${label}</span>`;
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ============================================================
   상태 & 렌더
   ============================================================ */
const state = {
  applied: { startDate:'', endDate:'', tm:'', name:'', phone:'', status:'' },
  page: 1,
  pageSize: 30,
};

async function fetchPage(){
  const p = new URLSearchParams({
    page:      String(state.page),
    pageSize:  String(state.pageSize),
    tm:        state.applied.tm,
    name:      state.applied.name,
    phone:     state.applied.phone,
    status:    state.applied.status,
    startDate: state.applied.startDate,
    endDate:   state.applied.endDate,
  });
  const res = await fetch('../api/admin/transmissions_list.php?' + p, { credentials: 'same-origin' });
  if (res.status === 401) { location.href = '../index.html'; return null; }
  if (res.status === 403) { alert('관리자 권한이 필요합니다.'); location.href = '../send.html'; return null; }
  const data = await res.json().catch(() => ({}));
  if (!data.ok) { alert(data.error || '조회 실패'); return null; }
  return data.data;
}

async function render(){
  const payload = await fetchPage();
  if (!payload) return;

  const rows = payload.rows || [];
  const total = payload.total || 0;
  const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > totalPages) state.page = totalPages;

  document.getElementById('totalCount').textContent = total;

  const $tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    $tbody.innerHTML = `<tr><td colspan="6" class="h-24 text-center text-ink-tertiary">데이터가 없습니다.</td></tr>`;
  } else {
    $tbody.innerHTML = rows.map(r => `
      <tr class="border-b border-divider text-[16px] text-ink-primary">
        <td class="h-14 px-4 whitespace-nowrap text-center">${escapeHtml(r.tmName)}</td>
        <td class="h-14 px-4 whitespace-nowrap text-center">${escapeHtml(r.name)}</td>
        <td class="h-14 px-4 whitespace-nowrap text-center">${escapeHtml(r.phone)}</td>
        <td class="h-14 px-4 whitespace-nowrap text-center text-ink-secondary">${escapeHtml(r.sentAt)}</td>
        <td class="h-14 px-4 whitespace-nowrap text-center">${badge(r.status)}</td>
        <td class="h-14 px-4 whitespace-nowrap text-center">
          <div class="flex items-center justify-center gap-[8px]">
            <button type="button" data-action="edit"   data-id="${r.id}"
                    class="h-[32px] px-[12px] rounded-[8px] border border-line text-[13px] text-ink-primary bg-white hover:bg-page transition-colors">수정</button>
            <button type="button" data-action="delete" data-id="${r.id}" data-name="${escapeHtml(r.name)}"
                    class="h-[32px] px-[12px] rounded-[8px] border border-line text-[13px] text-red-600 bg-white hover:bg-red-50 transition-colors">삭제</button>
          </div>
        </td>
      </tr>
    `).join('');

    $tbody.querySelectorAll('button[data-action="edit"]').forEach(b => {
      b.addEventListener('click', () => openTxModal(Number(b.dataset.id)));
    });
    $tbody.querySelectorAll('button[data-action="delete"]').forEach(b => {
      b.addEventListener('click', () => deleteTx(Number(b.dataset.id), b.dataset.name));
    });
  }

  renderPagination(totalPages);
}

function renderPagination(totalPages){
  const $nav = document.getElementById('pagination');
  const p = state.page;
  const sib = 2;
  const a = Math.max(1, p - sib);
  const b = Math.min(totalPages, p + sib);

  const make = (label, opts={}) => {
    const { disabled, active, target, ariaLabel } = opts;
    const base = 'min-w-[36px] h-9 px-2 rounded-[8px] text-[14px] transition-colors';
    const cls = active
      ? 'text-ink-primary font-semibold underline underline-offset-4'
      : (disabled ? 'text-[#CCC] cursor-not-allowed' : 'text-ink-secondary hover:text-ink-primary');
    return `<button type="button" data-page="${target ?? ''}" ${disabled?'disabled':''} aria-label="${ariaLabel||''}" class="${base} ${cls}">${label}</button>`;
  };

  let html = '';
  html += make('«', { disabled:p===1, target:1, ariaLabel:'first' });
  html += make('‹', { disabled:p===1, target:p-1, ariaLabel:'prev' });
  for (let i = a; i <= b; i++) html += make(String(i), { active:i===p, target:i });
  html += make('›', { disabled:p===totalPages, target:p+1, ariaLabel:'next' });
  html += make('»', { disabled:p===totalPages, target:totalPages, ariaLabel:'last' });

  $nav.innerHTML = html;
  $nav.querySelectorAll('button[data-page]').forEach(btn => {
    if (btn.disabled) return;
    btn.addEventListener('click', () => {
      const next = Number(btn.dataset.page);
      if (next && next !== state.page) { state.page = next; render(); }
    });
  });
}

/* ============================================================
   필터 이벤트
   ============================================================ */
document.getElementById('searchBtn').addEventListener('click', () => {
  state.applied = {
    startDate: document.getElementById('fStart').value,
    endDate:   document.getElementById('fEnd').value,
    tm:        document.getElementById('fTm').value.trim(),
    name:      document.getElementById('fName').value.trim(),
    phone:     document.getElementById('fPhone').value.trim(),
    status:    document.getElementById('fStatus').value,
  };
  state.page = 1;
  render();
});
document.getElementById('pageSize').addEventListener('change', e => {
  state.pageSize = Number(e.target.value);
  state.page = 1;
  render();
});

/* ============================================================
   수정 모달
   ============================================================ */
const $tx = document.getElementById('txModal');
let txDetail = null; // { row, history }

async function openTxModal(id){
  try {
    const res = await fetch('../api/admin/transmission_detail.php?id=' + id, { credentials: 'same-origin' });
    if (res.status === 401) { location.href = '../index.html'; return; }
    const data = await res.json().catch(() => ({}));
    if (!data.ok) { alert(data.error || '상세 조회 실패'); return; }
    txDetail = data.data;

    document.getElementById('txId').value      = txDetail.row.id;
    document.getElementById('txTm').textContent     = txDetail.row.tmName || '—';
    document.getElementById('txName').value         = txDetail.row.name  || '';
    document.getElementById('txPhone').value        = txDetail.row.phone || '';
    document.getElementById('txSentAt').textContent = txDetail.row.sentAt|| '—';
    document.getElementById('txStatus').value       = txDetail.row.status|| '알림톡전송';

    // 진행상태별 일시 (수정 가능 datetime-local)
    const $h = document.getElementById('txHistory');
    if (!txDetail.history.length) {
      $h.innerHTML = `<div class="px-[20px] py-[16px] text-ink-tertiary text-[14px]">기록된 단계가 없습니다.</div>`;
    } else {
      $h.innerHTML = txDetail.history.map(h => {
        const localVal = (h.at || '').replace(' ', 'T').slice(0, 16); // YYYY-MM-DDTHH:MM
        return `
          <div class="flex items-stretch min-h-[56px] border-b border-divider" data-hid="${h.id}">
            <div class="w-[180px] bg-field px-[20px] flex items-center text-[14px] text-ink-secondary">${escapeHtml(h.status)}</div>
            <div class="flex-1 px-[16px] flex items-center gap-[12px]">
              <input type="datetime-local" value="${escapeHtml(localVal)}"
                     class="hist-at h-[40px] flex-1 rounded-[8px] bg-white border border-line px-[12px] text-[14px] text-ink-primary outline-none focus:border-primary" />
            </div>
          </div>
        `;
      }).join('');
    }

    $tx.classList.remove('hidden');
    $tx.classList.add('flex');
    document.body.style.overflow = 'hidden';
  } catch (err) {
    alert('네트워크 오류: ' + err.message);
  }
}
function closeTx(){
  $tx.classList.add('hidden');
  $tx.classList.remove('flex');
  document.body.style.overflow = '';
}
document.getElementById('txCancel').addEventListener('click', closeTx);
document.getElementById('txModalClose').addEventListener('click', closeTx);
$tx.addEventListener('click', (e) => { if (e.target === $tx) closeTx(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !$tx.classList.contains('hidden')) closeTx();
});

/* ============================================================
   저장 (수정)
   ============================================================ */
async function onTxSubmit(e){
  e.preventDefault();
  if (!txDetail) return false;

  // 단계별 일시 수집
  const historyEdits = [];
  document.querySelectorAll('#txHistory > div[data-hid]').forEach(row => {
    const hid = Number(row.dataset.hid);
    const inp = row.querySelector('.hist-at');
    if (hid && inp && inp.value) {
      historyEdits.push({ id: hid, changed_at: inp.value.replace('T', ' ') + ':00' });
    }
  });

  const body = {
    id:     Number(document.getElementById('txId').value),
    name:   document.getElementById('txName').value.trim(),
    phone:  document.getElementById('txPhone').value.trim(),
    status: document.getElementById('txStatus').value,
    history: historyEdits,
  };

  try {
    const res = await fetch('../api/admin/transmission_save.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'same-origin',
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || '저장 실패'); return false; }
    closeTx();
    await render();
  } catch (err) {
    alert('네트워크 오류: ' + err.message);
  }
  return false;
}

/* ============================================================
   삭제
   ============================================================ */
async function deleteTx(id, name){
  if (!confirm(`'${name}'의 전송 내역을 삭제하시겠습니까?\n(관련 진행상태 이력도 함께 삭제됩니다.)`)) return;
  try {
    const res = await fetch('../api/admin/transmission_delete.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
      credentials: 'same-origin',
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || '삭제 실패'); return; }
    await render();
  } catch (err) {
    alert('네트워크 오류: ' + err.message);
  }
}
</script>
