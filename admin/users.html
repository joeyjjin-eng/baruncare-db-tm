<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바른케어플러스 TM · 관리자 · TM 관리</title>

<style>
  @font-face { font-family:'Pretendard'; font-weight:400; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Regular.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:500; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Medium.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:600; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:700; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Bold.woff2') format('woff2'); }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Pretendard','"Apple SD Gothic Neo"','system-ui','sans-serif'] },
        colors: {
          primary: { DEFAULT:'#FF8A65', hover:'#F47551', press:'#E36544', bg:'#FFF1EB' },
          page: '#F8F9FA',
          tableHead: '#F4F4F4',
          ink: { primary:'#333333', secondary:'#666666', tertiary:'#999999', placeholder:'#AAAAAA' },
          line: '#E5E7EB',
          divider: '#EEEEEE',
          field: '#F6F6F6',
        },
        maxWidth: { page: '1200px' },
      },
    },
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    background:#FFFFFF; color:#333333; font-size:16px; line-height:1.5;
    -webkit-font-smoothing: antialiased; letter-spacing:-0.01em;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select { font-family: inherit; font-size: inherit; }
  a { color: inherit; text-decoration: none; }
</style>

<style type="text/tailwindcss">
  @layer base {
    h1 { font-size: 24px; font-weight: 700; line-height: 1.3; margin: 0; }
    h2 { font-size: 18px; font-weight: 600; line-height: 1.4; margin: 0; }
  }
</style>
</head>
<body class="font-sans">

<div class="min-h-screen flex flex-col bg-white">

  <!-- Header -->
  <header class="w-full bg-white border-b border-divider">
    <div class="max-w-page mx-auto h-[72px] px-6 flex items-center justify-between">
      <a href="./users.html" class="flex items-center gap-3" aria-label="관리자 홈">
        <img src="../assets/바른케어플러스.png" alt="바른케어플러스" class="h-7 w-auto" />
        <span class="inline-flex items-center h-[24px] px-[10px] rounded-[8px] bg-primary-bg text-primary text-[12px] font-semibold">관리자</span>
      </a>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span id="meAvatar" class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-[#EEEEEE] text-[14px] font-semibold text-ink-primary">관</span>
          <span class="text-[14px] text-ink-primary"><strong id="meName" class="font-semibold">관리자</strong> <span class="font-normal text-ink-secondary">님</span></span>
        </div>
        <a id="logoutBtn" href="#" class="h-9 px-4 inline-flex items-center rounded-[8px] border border-line text-[14px] text-ink-primary bg-white hover:bg-page transition-colors">로그아웃</a>
      </div>
    </div>

    <nav class="border-t border-divider">
      <ul class="max-w-page mx-auto h-12 px-6 flex items-center justify-center gap-10">
        <li><a href="./users.html"              class="inline-flex items-center h-12 text-[16px] font-semibold text-ink-primary">TM 관리</a></li>
        <li><a href="./transmissions.html"      class="inline-flex items-center h-12 text-[16px] font-normal text-ink-secondary hover:text-ink-primary transition-colors">전송내역 관리</a></li>
        <li><a href="./claim-applications.html" class="inline-flex items-center h-12 text-[16px] font-normal text-ink-secondary hover:text-ink-primary transition-colors">청구도우미 신청</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main -->
  <main class="flex-1 w-full">
    <div class="max-w-page mx-auto px-6 py-10">

      <section class="max-w-[1040px] mx-auto">

        <!-- 상단: 제목 + 등록 버튼 -->
        <div class="flex items-center justify-between mb-[20px]">
          <h1 class="text-ink-primary">TM 관리</h1>
          <button id="btnNew" type="button"
                  class="h-[40px] px-[18px] rounded-[8px] bg-primary text-white text-[14px] font-semibold hover:bg-primary-hover active:bg-primary-press transition-colors">
            + TM 등록
          </button>
        </div>

        <!-- Total -->
        <p class="mb-[12px] text-[14px] text-ink-secondary">총 <strong id="totalCount" class="font-semibold text-ink-primary">0</strong>명</p>

        <!-- Table -->
        <div class="w-full overflow-x-auto">
          <table class="w-full border-collapse">
            <thead>
              <tr class="bg-tableHead text-ink-secondary text-[14px] border-b border-[#404040]">
                <th class="h-12 px-4 font-medium whitespace-nowrap text-center" style="width:160px">이름</th>
                <th class="h-12 px-4 font-medium whitespace-nowrap text-center" style="width:180px">아이디</th>
                <th class="h-12 px-4 font-medium whitespace-nowrap text-center" style="width:100px">권한</th>
                <th class="h-12 px-4 font-medium whitespace-nowrap text-center" style="width:200px">등록일</th>
                <th class="h-12 px-4 font-medium whitespace-nowrap text-center" style="width:200px">관리</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-divider bg-white">
    <div class="max-w-page mx-auto px-6 py-10 flex flex-col items-center gap-2">
      <p class="text-[14px] text-ink-primary"><span class="font-semibold">Copyright</span> ⓒ 천호인터내셔널</p>
      <p class="text-[14px] text-ink-tertiary">1644-0161(10:00~17:00) | cs@weplat.co.kr</p>
    </div>
  </footer>
</div>


<!-- ============================================================
     사용자 등록/수정 모달
     ============================================================ -->
<div id="userModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 px-4 py-6"
     role="dialog" aria-modal="true" aria-labelledby="userModalTitle">
  <div class="bg-white rounded-[8px] w-full max-w-[480px] shadow-card relative pt-[44px] pr-[44px] pb-[36px] pl-[44px] max-h-[90vh] overflow-y-auto">

    <button id="userModalClose" type="button" aria-label="닫기"
            class="absolute top-[20px] right-[20px] w-[36px] h-[36px] inline-flex items-center justify-center hover:opacity-70 transition-opacity">
      <img src="../assets/icn_x.png" alt="닫기" class="w-[20px] h-[20px]" draggable="false" />
    </button>

    <h2 id="userModalTitle" class="text-center mb-[28px]">TM 등록</h2>

    <form id="userForm" class="flex flex-col gap-[20px]" onsubmit="return onUserSubmit(event)">
      <input type="hidden" id="ufId" value="" />

      <div>
        <label for="ufName" class="block mb-[8px] text-[14px] font-medium text-ink-secondary">이름</label>
        <div class="flex items-center h-[48px] rounded-[8px] bg-white border border-line focus-within:border-primary px-[16px]">
          <input id="ufName" type="text" placeholder="이름" class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
        </div>
      </div>

      <div>
        <label for="ufUsername" class="block mb-[8px] text-[14px] font-medium text-ink-secondary">아이디</label>
        <div class="flex items-center h-[48px] rounded-[8px] bg-white border border-line focus-within:border-primary px-[16px]">
          <input id="ufUsername" type="text" autocomplete="off" placeholder="영문/숫자/._- 3~50자" class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
        </div>
      </div>

      <div>
        <label for="ufPassword" class="block mb-[8px] text-[14px] font-medium text-ink-secondary">비밀번호 <span id="ufPwHint" class="text-ink-tertiary font-normal">(필수)</span></label>
        <div class="flex items-center h-[48px] rounded-[8px] bg-white border border-line focus-within:border-primary px-[16px]">
          <input id="ufPassword" type="password" autocomplete="new-password" placeholder="4자 이상" class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
        </div>
      </div>

      <div>
        <label for="ufRole" class="block mb-[8px] text-[14px] font-medium text-ink-secondary">권한</label>
        <select id="ufRole" class="h-[48px] w-full rounded-[8px] bg-white border border-line px-[12px] text-[16px] text-ink-primary outline-none focus:border-primary">
          <option value="user">user (TM)</option>
          <option value="admin">admin (관리자)</option>
        </select>
      </div>

      <div class="mt-[16px] flex items-center justify-end gap-[12px]">
        <button type="button" id="userCancel" class="h-[44px] px-[20px] text-[14px] font-medium text-ink-secondary hover:text-ink-primary transition-colors">취소</button>
        <button type="submit" id="userOk" class="h-[44px] px-[24px] rounded-[8px] bg-primary text-white text-[14px] font-semibold hover:bg-primary-hover active:bg-primary-press transition-colors">저장</button>
      </div>
    </form>
  </div>
</div>


<script>
/* ============================================================
   세션 확인 + 헤더 사용자명 반영
   ============================================================ */
let ME = null;
(async () => {
  try {
    const res = await fetch('../api/me.php', { credentials: 'same-origin' });
    if (res.status === 401) { location.href = './login.html'; return; }
    const data = await res.json();
    if (!data.ok) { location.href = './login.html'; return; }
    ME = data.data.user;
    if (ME.role !== 'admin') { alert('관리자만 접근 가능합니다.'); location.href = '../send.html'; return; }
    document.getElementById('meName').textContent   = ME.name;
    document.getElementById('meAvatar').textContent = (ME.name || '관').charAt(0);
    await renderList();
  } catch (_) {
    location.href = './login.html';
  }
})();

/* ============================================================
   로그아웃
   ============================================================ */
document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await fetch('../api/logout.php', { credentials: 'same-origin' }); } catch (_) {}
  location.href = './login.html';
});

/* ============================================================
   목록 로드 + 렌더
   ============================================================ */
const $tbody = document.getElementById('tbody');
const $total = document.getElementById('totalCount');

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function renderList(){
  const res = await fetch('../api/admin/users_list.php', { credentials: 'same-origin' });
  if (res.status === 401) { location.href = './login.html'; return; }
  if (res.status === 403) { alert('관리자 권한이 필요합니다.'); location.href = '../send.html'; return; }
  const data = await res.json().catch(() => ({}));
  if (!data.ok) { alert(data.error || '목록 조회 실패'); return; }

  const rows = data.data.rows || [];
  $total.textContent = rows.length;

  if (rows.length === 0) {
    $tbody.innerHTML = `<tr><td colspan="5" class="h-24 text-center text-ink-tertiary">등록된 사용자가 없습니다.</td></tr>`;
    return;
  }

  $tbody.innerHTML = rows.map(r => `
    <tr class="border-b border-divider text-[16px] text-ink-primary">
      <td class="h-14 px-4 whitespace-nowrap text-center">${escapeHtml(r.name)}</td>
      <td class="h-14 px-4 whitespace-nowrap text-center">${escapeHtml(r.username)}</td>
      <td class="h-14 px-4 whitespace-nowrap text-center">
        <span class="inline-flex items-center h-[26px] px-[10px] rounded-[8px] text-[13px] font-medium ${r.role === 'admin' ? 'bg-primary-bg text-primary' : 'bg-[#F5F5F5] text-ink-secondary'}">
          ${r.role}
        </span>
      </td>
      <td class="h-14 px-4 whitespace-nowrap text-center text-ink-secondary">${escapeHtml(r.createdAt)}</td>
      <td class="h-14 px-4 whitespace-nowrap text-center">
        <div class="flex items-center justify-center gap-[8px]">
          <button type="button" data-action="edit"   data-id="${r.id}" data-row='${escapeHtml(JSON.stringify(r))}'
                  class="h-[32px] px-[12px] rounded-[8px] border border-line text-[13px] text-ink-primary bg-white hover:bg-page transition-colors">수정</button>
          <button type="button" data-action="delete" data-id="${r.id}" data-name="${escapeHtml(r.name)}"
                  class="h-[32px] px-[12px] rounded-[8px] border border-line text-[13px] text-red-600 bg-white hover:bg-red-50 transition-colors">삭제</button>
        </div>
      </td>
    </tr>
  `).join('');

  // 수정/삭제 버튼 핸들러
  $tbody.querySelectorAll('button[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = JSON.parse(btn.dataset.row);
      openUserModal(r);
    });
  });
  $tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteUser(Number(btn.dataset.id), btn.dataset.name));
  });
}

/* ============================================================
   모달 제어
   ============================================================ */
const $modal     = document.getElementById('userModal');
const $modalTitle= document.getElementById('userModalTitle');
const $ufId      = document.getElementById('ufId');
const $ufName    = document.getElementById('ufName');
const $ufUsername= document.getElementById('ufUsername');
const $ufPassword= document.getElementById('ufPassword');
const $ufRole    = document.getElementById('ufRole');
const $ufPwHint  = document.getElementById('ufPwHint');

function openUserModal(row /* null=신규, {…}=수정 */){
  if (row) {
    $modalTitle.textContent  = 'TM 수정';
    $ufId.value       = row.id;
    $ufName.value     = row.name || '';
    $ufUsername.value = row.username || '';
    $ufPassword.value = '';
    $ufPwHint.textContent = '(변경 시에만 입력)';
    $ufRole.value     = row.role || 'user';
  } else {
    $modalTitle.textContent  = 'TM 등록';
    $ufId.value = '';
    $ufName.value = $ufUsername.value = $ufPassword.value = '';
    $ufPwHint.textContent = '(필수)';
    $ufRole.value = 'user';
  }
  $modal.classList.remove('hidden');
  $modal.classList.add('flex');
  document.body.style.overflow = 'hidden';
  setTimeout(() => $ufName.focus(), 0);
}
function closeUserModal(){
  $modal.classList.add('hidden');
  $modal.classList.remove('flex');
  document.body.style.overflow = '';
}

document.getElementById('btnNew').addEventListener('click', () => openUserModal(null));
document.getElementById('userCancel').addEventListener('click', closeUserModal);
document.getElementById('userModalClose').addEventListener('click', closeUserModal);
$modal.addEventListener('click', (e) => { if (e.target === $modal) closeUserModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !$modal.classList.contains('hidden')) closeUserModal();
});

/* ============================================================
   저장 (등록/수정)
   ============================================================ */
async function onUserSubmit(e){
  e.preventDefault();
  const body = {
    id:       $ufId.value ? Number($ufId.value) : 0,
    name:     $ufName.value.trim(),
    username: $ufUsername.value.trim(),
    password: $ufPassword.value,    // 수정 시 빈 값이면 변경 안 함
    role:     $ufRole.value,
    is_active: 1,
  };
  try {
    const res = await fetch('../api/admin/user_save.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'same-origin',
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || '저장 실패'); return false; }
    closeUserModal();
    await renderList();
  } catch (err) {
    alert('네트워크 오류: ' + err.message);
  }
  return false;
}

/* ============================================================
   삭제
   ============================================================ */
async function deleteUser(id, name){
  if (!confirm(`'${name}' 사용자를 삭제하시겠습니까?\n(이 작업은 되돌릴 수 없습니다.)`)) return;
  try {
    const res = await fetch('../api/admin/user_delete.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
      credentials: 'same-origin',
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || '삭제 실패'); return; }
    await renderList();
  } catch (err) {
    alert('네트워크 오류: ' + err.message);
  }
}
</script>

</body>
</html>
