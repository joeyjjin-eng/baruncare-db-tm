<script>
/* ============================================================
   서버 API 연동 — Mock 데이터는 제거됨
     - GET  /api/history.php  : 목록 + 필터 + 페이지네이션
     - GET  /api/detail.php   : 한 건 상세 + 상태 이력
     - GET  /api/me.php       : 로그인 사용자 정보
     - POST /api/logout.php   : 로그아웃
   ============================================================ */

/* ============================================================
   상태 -> 배지 클래스 매핑
   ============================================================ */
const BADGE_CLASS = {
  '알림톡전송' : 'bg-status-notify-bg text-status-notify-fg',
  '케어신청완료': 'bg-status-care-bg   text-status-care-fg',
  '매칭완료'  : 'bg-status-match-bg  text-status-match-fg',
  '정산완료'  : 'bg-status-settle-bg text-status-settle-fg',
};

/*
  ▼ 상태 배지 스타일
  - w-[164px]: 가로 길이 고정
  - h-[38px]: 세로 높이
  - rounded-[8px]: 모서리 (라운드 사각형)
  - text-[14px] font-medium: 본문보다 한 단계 작은 옵션 사이즈
  - 외곽선 없음 (배경색만)
*/
function badge(label){
  const cls = BADGE_CLASS[label] || BADGE_CLASS['정산완료'];
  return `<span class="inline-flex items-center justify-center w-[164px] h-[38px] rounded-[8px] text-[16px] font-medium ${cls}">${label}</span>`;
}

/* ============================================================
   체크박스 (현재 미사용 — 다시 쓰려면 아래 블록 주석 해제)
   - 이미지 에셋: check_on.png / check_off.png, 20×20
   ============================================================ */
/*
const CB_ON  = `<img src="./assets/check_on.png"  alt="" class="block w-[20px] h-[20px]" draggable="false" />`;
const CB_OFF = `<img src="./assets/check_off.png" alt="" class="block w-[20px] h-[20px]" draggable="false" />`;

function paintCheckbox(btn, state){
  // state: 'unchecked' | 'checked' | 'indeterminate'
  // 부분선택(indeterminate)은 별도 에셋이 없어 'checked'와 동일하게 ON 이미지로 표시
  btn.dataset.state = state;
  btn.setAttribute('aria-checked', state === 'indeterminate' ? 'mixed' : (state === 'checked' ? 'true' : 'false'));
  btn.className = 'cb inline-flex items-center justify-center w-[20px] h-[20px] align-middle';
  btn.innerHTML = (state === 'unchecked') ? CB_OFF : CB_ON;
}
*/

/* ============================================================
   상태
   ============================================================ */
const state = {
  filters: { startDate:'2020-01-01', endDate:'2020-01-01', name:'', phone:'' },
  applied: { startDate:'2020-01-01', endDate:'2020-01-01', name:'', phone:'' },
  page: 1,
  pageSize: 15,
  selected: new Set(),
};

/* ============================================================
   서버에서 목록 가져오기
   ============================================================ */
async function fetchPage(){
  const params = new URLSearchParams({
    page:      String(state.page),
    pageSize:  String(state.pageSize),
    name:      state.applied.name  || '',
    phone:     state.applied.phone || '',
    startDate: state.applied.startDate || '',
    endDate:   state.applied.endDate   || '',
  });
  const res = await fetch('./api/history.php?' + params.toString(), { credentials: 'same-origin' });
  if (res.status === 401) { location.href = './index.html'; return null; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.ok) throw new Error(data.error || '조회 실패');
  return data.data; // { rows, total, page, pageSize }
}

/* ============================================================
   렌더 (서버 응답을 그리기)
   ============================================================ */
async function render(){
  let payload;
  try { payload = await fetchPage(); }
  catch (err) {
    alert('내역 조회 실패: ' + err.message);
    return;
  }
  if (!payload) return; // 401 → 이미 리다이렉트

  const pageRows   = payload.rows  || [];
  const total      = payload.total || 0;
  const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > totalPages) state.page = totalPages;

  document.getElementById('totalCount').textContent = total;

  // Body
  const tbody = document.getElementById('tbody');
  if (pageRows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="h-24 text-center text-ink-tertiary">데이터가 없습니다.</td></tr>`;
  } else {
    tbody.innerHTML = pageRows.map(r => {
      // const checked = state.selected.has(r.id); // 체크박스 미사용
      return `
        <tr class="row-tr border-b border-divider text-[16px] text-ink-primary cursor-pointer hover:bg-page transition-colors" data-row-id="${r.id}">
          <!-- 체크박스 셀 (현재 미사용 — 다시 쓰려면 아래 주석 해제 + render() 안의 row-cb 핸들러 복원)
          <td class="h-14 w-12 px-3 text-center align-middle">
            <button type="button" role="checkbox" aria-checked="\${checked}" data-row-id="\${r.id}"
              class="cb row-cb inline-flex items-center justify-center w-[20px] h-[20px] align-middle">
              \${checked ? CB_ON : CB_OFF}
            </button>
          </td>
          -->
          <td class="h-14 px-4 whitespace-nowrap text-center">${r.sentAt}</td>
          <td class="h-14 px-4 whitespace-nowrap text-center">${r.name}</td>
          <td class="h-14 px-4 whitespace-nowrap text-center">${r.phone}</td>
          <td class="h-14 px-4 whitespace-nowrap text-center">${badge(r.status)}</td>
        </tr>`;
    }).join('');
  }

  // ────────────────────────────────────────────────
  // 체크박스 관련 코드 (현재 미사용 — 다시 쓰려면 아래 블록 주석 해제)
  // ────────────────────────────────────────────────
  /*
  // Header checkbox state
  const allIds = pageRows.map(r => r.id);
  const allChecked = allIds.length > 0 && allIds.every(id => state.selected.has(id));
  const someChecked = !allChecked && allIds.some(id => state.selected.has(id));
  const headerCb = document.getElementById('checkAll');
  paintCheckbox(headerCb, allChecked ? 'checked' : (someChecked ? 'indeterminate' : 'unchecked'));

  // Row checkbox handlers
  document.querySelectorAll('.row-cb').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation(); // 행 클릭으로 전파되어 모달이 뜨지 않도록 차단
      const id = Number(btn.dataset.rowId);
      if (state.selected.has(id)) state.selected.delete(id);
      else state.selected.add(id);
      render();
    });
  });
  */

  // Row click → 상세 모달 (id로 서버 조회)
  document.querySelectorAll('.row-tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const id = Number(tr.dataset.rowId);
      if (id) openDetail(id);
    });
  });

  // Pagination
  renderPagination(totalPages);
}

function renderPagination(totalPages){
  const $nav = document.getElementById('pagination');
  const p = state.page;
  const sib = 2;
  const startN = Math.max(1, p - sib);
  const endN = Math.min(totalPages, p + sib);

  const btn = (label, opts={}) => {
    const { disabled, active, target, ariaLabel } = opts;
    const base = 'min-w-[36px] h-9 px-2 rounded-[8px] text-[14px] transition-colors';
    const cls = active
      ? 'text-ink-primary font-semibold underline underline-offset-4'
      : (disabled
          ? 'text-[#CCC] cursor-not-allowed'
          : 'text-ink-secondary hover:text-ink-primary');
    return `<button type="button" data-page="${target ?? ''}" ${disabled ? 'disabled' : ''} aria-label="${ariaLabel||''}" class="${base} ${cls}">${label}</button>`;
  };

  let html = '';
  html += btn('«', { disabled:p===1, target:1, ariaLabel:'first' });
  html += btn('‹', { disabled:p===1, target:p-1, ariaLabel:'prev' });
  for (let i = startN; i <= endN; i++) {
    html += btn(String(i), { active:i===p, target:i });
  }
  html += btn('›', { disabled:p===totalPages, target:p+1, ariaLabel:'next' });
  html += btn('»', { disabled:p===totalPages, target:totalPages, ariaLabel:'last' });
  $nav.innerHTML = html;
  $nav.querySelectorAll('button[data-page]').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      const next = Number(b.dataset.page);
      if (next && next !== state.page) {
        state.page = next;
        state.selected.clear();
        render();
      }
    });
  });
}

/* ============================================================
   고객 상세 모달 (서버 조회: GET /api/detail.php?id=...)
   ============================================================ */
const $detail        = document.getElementById('detailModal');
const $detailName    = document.getElementById('detailName');
const $detailPhone   = document.getElementById('detailPhone');
const $detailHistory = document.getElementById('detailHistory');
const $detailClose   = document.getElementById('detailClose');

async function openDetail(id){
  try {
    const res = await fetch('./api/detail.php?id=' + encodeURIComponent(id), { credentials: 'same-origin' });
    if (res.status === 401) { location.href = './index.html'; return; }
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || '상세 조회 실패'); return; }

    const row     = data.data.row     || {};
    const history = data.data.history || [];

    $detailName.textContent  = row.name  || '';
    $detailPhone.textContent = row.phone || '';
    $detailHistory.innerHTML = history.map(h => `
      <div class="flex items-stretch min-h-[56px] border-b border-divider">
        <div class="w-[200px] bg-field px-[24px] flex items-center text-[16px] text-ink-secondary">${h.status}</div>
        <div class="flex-1 px-[24px] flex items-center text-[16px] text-ink-primary">${h.at}</div>
      </div>
    `).join('');

    $detail.classList.remove('hidden');
    $detail.classList.add('flex');
    document.body.style.overflow = 'hidden';
  } catch (err) {
    alert('네트워크 오류: ' + (err && err.message ? err.message : err));
  }
}
function closeDetail(){
  $detail.classList.add('hidden');
  $detail.classList.remove('flex');
  document.body.style.overflow = '';
}

$detailClose.addEventListener('click', closeDetail);
$detail.addEventListener('click', (e) => { if (e.target === $detail) closeDetail(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !$detail.classList.contains('hidden')) closeDetail();
});

/* ============================================================
   로그인 상태 확인 + 헤더에 사용자 이름 반영
   ============================================================ */
(async () => {
  try {
    const res = await fetch('./api/me.php', { credentials: 'same-origin' });
    if (res.status === 401) { location.href = './index.html'; return; }
    const data = await res.json();
    const name = data && data.ok && data.data && data.data.user ? data.data.user.name : '';
    if (name) {
      const $avatar = document.querySelector('header span.rounded-full');
      const $label  = document.querySelector('header .text-ink-primary strong');
      if ($avatar) $avatar.textContent = name.charAt(0);
      if ($label)  $label.textContent  = name;
    }
  } catch (_) { /* ignore */ }
})();
