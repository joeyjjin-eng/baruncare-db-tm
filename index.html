<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바른케어플러스 TM · 로그인</title>

<style>
  /* Local Pretendard font */
  @font-face { font-family:'Pretendard'; font-weight:400; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Regular.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:500; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Medium.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:600; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:700; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Bold.woff2') format('woff2'); }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard','"Apple SD Gothic Neo"','system-ui','sans-serif'],
        },
        colors: {
          primary: { DEFAULT:'#FF8A65', hover:'#F47551', press:'#E36544', bg:'#FFF1EB' },
          page: '#F8F9FA',
          tableHead: '#F4F4F4',
          ink: { primary:'#333333', secondary:'#666666', tertiary:'#999999', placeholder:'#AAAAAA' },
          line: '#E5E7EB',
          divider: '#EEEEEE',
          field: '#F1F2F4',
        },
        boxShadow: { card: '0 1px 2px rgba(0,0,0,0.04)' },
        maxWidth: { page: '1200px' },
      },
    },
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family: 'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    background: #F8F9FA;
    color: #333333;
    font-size: 16px;            /* 본문 */
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select { font-family: inherit; font-size: inherit; }
  a { color: inherit; text-decoration: none; }
</style>

<!-- Tailwind이 처리하는 base layer: preflight 뒤에 적용되어야 우선됨 -->
<style type="text/tailwindcss">
  @layer base {
    /* Type scale: 24 / 18 / 16 / 14 */
    h1 { font-size: 24px; font-weight: 700; line-height: 1.3; margin: 0; }   /* 제목1 */
    h2 { font-size: 18px; font-weight: 600; line-height: 1.4; margin: 0; }   /* 제목2 */
  }
</style>
</head>
<body class="font-sans">

<div class="min-h-screen flex flex-col bg-page">
  <!-- Center area -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-16">

    <!-- Logo -->
    <img src="./assets/바른케어플러스.png" alt="바른케어플러스" class="h-10 w-auto mb-12 select-none" draggable="false" />

    <!-- Login Cards (split into two) -->
    <section class="w-full flex flex-col md:flex-row md:justify-center md:items-center gap-[24px]" aria-label="TM 로그인">

      <!-- Left: Illustration -->
      <div class="relative rounded-[8px] overflow-hidden aspect-square md:aspect-auto md:w-[497px] md:h-[464px] md:shrink-0">
        <img src="./assets/img_login.png" alt="간호사와 어르신 일러스트"
             class="absolute inset-0 w-full h-full object-cover select-none" draggable="false" />
      </div>

      <!-- Right: Form Card -->
      <div class="bg-white rounded-[8px] border border-divider shadow-card px-8 md:px-14 py-12 md:py-0 md:w-[497px] md:h-[464px] md:shrink-0 flex flex-col justify-center">
        <h1 class="text-center text-ink-primary mb-8">TM 로그인</h1>

        <form id="loginForm" class="flex flex-col gap-5" onsubmit="return onLoginSubmit(event)">
          <div>
            <label for="loginId" class="block mb-2 text-[14px] font-medium text-ink-secondary">아이디</label>
            <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4">
              <input id="loginId" name="id" type="text" placeholder="아이디" autocomplete="username"
                     class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
            </div>
          </div>

          <div>
            <label for="loginPw" class="block mb-2 text-[14px] font-medium text-ink-secondary">비밀번호</label>
            <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4">
              <input id="loginPw" name="password" type="password" placeholder="비밀번호" autocomplete="current-password"
                     class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
            </div>
          </div>

          <button type="submit"
                  class="mt-2 h-14 w-full rounded-[8px] bg-primary text-white text-[16px] font-semibold transition-colors hover:bg-primary-hover active:bg-primary-press">
            로그인
          </button>
        </form>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer class="border-t border-divider bg-white">
    <div class="max-w-page mx-auto px-6 py-10 flex flex-col items-center gap-2">
      <p class="text-[14px] text-ink-primary">
        <span class="font-semibold">Copyright</span> ⓒ 천호인터내셔널
      </p>
      <p class="text-[14px] text-ink-tertiary">1644-0161(10:00~17:00) | cs@weplat.co.kr</p>
    </div>
  </footer>
</div>

<script>
  function onLoginSubmit(e){
    e.preventDefault();
    // 데모: 입력값 검증 후 알림톡전송 페이지로 이동
    location.href = './send.html';
    return false;
  }
</script>

</body>
</html>
