<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바른케어플러스 TM · 회원가입</title>

<style>
  /* Local Pretendard font */
  @font-face { font-family:'Pretendard'; font-weight:400; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Regular.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:500; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Medium.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:600; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:700; font-style:normal; font-display:swap;
    src: url('./fonts/Pretendard-Bold.woff2') format('woff2'); }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Pretendard','"Apple SD Gothic Neo"','system-ui','sans-serif'] },
        colors: {
          primary: { DEFAULT:'#FF8A65', hover:'#F47551', press:'#E36544', bg:'#FFF1EB' },
          page: '#F8F9FA',
          ink: { primary:'#333333', secondary:'#666666', tertiary:'#999999', placeholder:'#AAAAAA' },
          line: '#E5E7EB',
          divider: '#EEEEEE',
          field: '#F1F2F4',
          danger: '#E84444',
          success: '#4CAF50',
        },
        boxShadow: { card: '0 1px 2px rgba(0,0,0,0.04)' },
        maxWidth: { page: '1200px' },
      },
    },
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    background:#F8F9FA;
    color:#333333;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input  { font-family: inherit; font-size: inherit; }
  a { color: inherit; text-decoration: none; }
</style>

<!-- Tailwind이 처리하는 base layer: preflight 뒤에 적용되어야 우선됨 -->
<style type="text/tailwindcss">
  @layer base {
    /* Type scale: 24 / 18 / 16 / 14 */
    h1 { font-size: 24px; font-weight: 700; line-height: 1.3; margin: 0; }   /* 제목1 */
    h2 { font-size: 18px; font-weight: 600; line-height: 1.4; margin: 0; }   /* 제목2 */
  }
</style>
</head>
<body class="font-sans">

<div class="min-h-screen flex flex-col bg-page">
  <!-- Center area -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-[56px]">

    <!-- Logo -->
    <a href="./index.html" aria-label="바른케어플러스 홈" class="mb-[36px]">
      <img src="./assets/바른케어플러스.png" alt="바른케어플러스" class="h-10 w-auto select-none" draggable="false" />
    </a>

    <!-- Card -->
    <section class="bg-white rounded-[8px] border border-divider shadow-card w-full max-w-[480px] px-8 md:px-12 py-[44px]">
      <h1 class="text-center text-ink-primary mb-[32px]">TM 회원가입</h1>

      <form id="signupForm" class="flex flex-col gap-[18px]" novalidate>

        <!-- 휴대폰번호 -->
        <div>
          <label for="inp-phone" class="flex items-center gap-1 mb-[8px] text-[14px] font-medium text-ink-secondary">
            <span class="text-primary">*</span>휴대폰번호
            <span class="ml-[2px] text-[12px] font-normal text-ink-tertiary">로그인 ID로 사용됩니다</span>
          </label>
          <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4 transition-colors" data-field="phone">
            <input id="inp-phone" type="tel" inputmode="tel" maxlength="13"
                   placeholder="010-0000-0000"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
          </div>
          <p id="msg-phone" class="hidden mt-[6px] text-[12px] text-danger"></p>
        </div>

        <!-- 이름 -->
        <div>
          <label for="inp-name" class="flex items-center gap-1 mb-[8px] text-[14px] font-medium text-ink-secondary">
            <span class="text-primary">*</span>이름
          </label>
          <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4 transition-colors" data-field="name">
            <input id="inp-name" type="text" autocomplete="name"
                   placeholder="이름을 입력해주세요"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
          </div>
          <p id="msg-name" class="hidden mt-[6px] text-[12px] text-danger"></p>
        </div>

        <!-- 생년월일 -->
        <div>
          <label for="inp-birth" class="flex items-center gap-1 mb-[8px] text-[14px] font-medium text-ink-secondary">
            <span class="text-primary">*</span>생년월일
          </label>
          <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4 transition-colors" data-field="birth">
            <input id="inp-birth" type="text" inputmode="numeric" maxlength="8"
                   placeholder="예: 19900101"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
          </div>
          <p id="hint-birth" class="mt-[6px] text-[12px] text-ink-tertiary">8자리 숫자로 입력해주세요 (예: 19900101)</p>
          <p id="msg-birth" class="hidden mt-[6px] text-[12px] text-danger"></p>
        </div>

        <!-- 비밀번호 -->
        <div>
          <label for="inp-pw" class="flex items-center gap-1 mb-[8px] text-[14px] font-medium text-ink-secondary">
            <span class="text-primary">*</span>비밀번호
          </label>
          <div class="relative flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary pl-4 pr-[44px] transition-colors" data-field="pw">
            <input id="inp-pw" type="password" autocomplete="new-password"
                   placeholder="영문+숫자 조합 8자 이상"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
            <button type="button" id="btn-toggle-pw" aria-label="비밀번호 표시"
                    class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 inline-flex items-center justify-center text-ink-tertiary hover:text-ink-secondary transition-colors">
              <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   class="hidden">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>

          <!-- 비밀번호 강도 -->
          <div id="pw-strength" class="hidden mt-[8px]">
            <div class="h-1 rounded-[2px] bg-[#EEEEEE] overflow-hidden mb-[4px]">
              <div id="pw-strength-fill" class="h-full w-0 rounded-[2px] transition-all duration-300"></div>
            </div>
            <span id="pw-strength-label" class="text-[12px] text-ink-tertiary"></span>
          </div>

          <p id="msg-pw" class="hidden mt-[6px] text-[12px] text-danger"></p>
        </div>

        <!-- 비밀번호 확인 -->
        <div>
          <label for="inp-pw2" class="flex items-center gap-1 mb-[8px] text-[14px] font-medium text-ink-secondary">
            <span class="text-primary">*</span>비밀번호 확인
          </label>
          <div class="relative flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary pl-4 pr-[44px] transition-colors" data-field="pw2">
            <input id="inp-pw2" type="password" autocomplete="new-password"
                   placeholder="비밀번호를 다시 입력해주세요"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
            <button type="button" id="btn-toggle-pw2" aria-label="비밀번호 확인 표시"
                    class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 inline-flex items-center justify-center text-ink-tertiary hover:text-ink-secondary transition-colors">
              <svg id="icon-eye2" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="icon-eye-off2" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   class="hidden">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <p id="msg-pw2" class="hidden mt-[6px] text-[12px] text-danger"></p>
        </div>

        <!-- 가입 버튼 -->
        <button type="submit" id="submitBtn"
                class="mt-[10px] h-14 w-full rounded-[8px] bg-primary text-white text-[16px] font-semibold transition-colors hover:bg-primary-hover active:bg-primary-press disabled:bg-[#FFD3C2] disabled:cursor-not-allowed">
          가입하기
        </button>
      </form>

      <p class="text-center mt-[18px] text-[14px] text-ink-tertiary">
        이미 계정이 있으신가요?
        <a href="./index.html" class="text-primary font-medium hover:underline">로그인</a>
      </p>
    </section>
  </div>

  <!-- Footer -->
  <footer class="border-t border-divider bg-white">
    <div class="max-w-page mx-auto px-6 py-10 flex flex-col items-center gap-2">
      <p class="text-[14px] text-ink-primary">
        <span class="font-semibold">Copyright</span> ⓒ 천호인터내셔널
      </p>
      <p class="text-[14px] text-ink-tertiary">1644-0161(10:00~17:00) | cs@weplat.co.kr</p>
    </div>
  </footer>
</div>

<!-- 가입 완료 모달 -->
<div id="signupModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 px-4"
     role="dialog" aria-modal="true" aria-labelledby="signupModalTitle">
  <div class="bg-white rounded-[8px] w-full max-w-[380px] px-10 pt-12 pb-10 text-center shadow-card">
    <div class="w-16 h-16 rounded-full bg-primary mx-auto mb-6 flex items-center justify-center">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h2 id="signupModalTitle" class="mb-[10px] text-ink-primary">회원가입 완료</h2>
    <p class="text-[14px] text-ink-tertiary leading-relaxed">
      가입이 완료되었습니다.<br>로그인 후 서비스를 이용하실 수 있습니다.
    </p>
    <button type="button" onclick="location.href='./index.html'"
            class="mt-7 h-12 w-full rounded-[8px] bg-primary text-white text-[15px] font-semibold transition-colors hover:bg-primary-hover active:bg-primary-press">
      로그인하러 가기
    </button>
  </div>
</div>

<script>
(function () {

  /* 1. 휴대폰 자동 하이픈 */
  document.getElementById('inp-phone').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    if (v.length >= 8)      v = v.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1-$2-$3');
    else if (v.length >= 4) v = v.replace(/(\d{3})(\d{0,4})/, '$1-$2');
    this.value = v;
  });

  /* 2. 생년월일 숫자만 */
  document.getElementById('inp-birth').addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 8);
  });

  /* 3. 비밀번호 보기/숨기기 */
  function setupTogglePw(btnId, inputId, eyeId, eyeOffId) {
    document.getElementById(btnId).addEventListener('click', function () {
      const inp = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      const eyeOff = document.getElementById(eyeOffId);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      eye.classList.toggle('hidden',    isHidden);
      eyeOff.classList.toggle('hidden', !isHidden);
      this.classList.toggle('text-primary', isHidden);
      this.classList.toggle('text-ink-tertiary', !isHidden);
    });
  }
  setupTogglePw('btn-toggle-pw',  'inp-pw',  'icon-eye',  'icon-eye-off');
  setupTogglePw('btn-toggle-pw2', 'inp-pw2', 'icon-eye2', 'icon-eye-off2');

  /* 4. 비밀번호 강도 */
  document.getElementById('inp-pw').addEventListener('input', function () {
    const v = this.value;
    const wrap = document.getElementById('pw-strength');
    const fill = document.getElementById('pw-strength-fill');
    const label = document.getElementById('pw-strength-label');
    if (!v) { wrap.classList.add('hidden'); return; }
    wrap.classList.remove('hidden');

    let score = 0;
    if (v.length >= 8)          score++;
    if (/[a-zA-Z]/.test(v))     score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^a-zA-Z0-9]/.test(v)) score++;

    const levels = [
      { w:'25%',  bg:'#E84444', txt:'매우 약함' },
      { w:'50%',  bg:'#FFA726', txt:'약함'     },
      { w:'75%',  bg:'#FFC107', txt:'보통'     },
      { w:'100%', bg:'#4CAF50', txt:'강함'     },
    ];
    const lv = levels[score - 1] || levels[0];
    fill.style.width = lv.w;
    fill.style.background = lv.bg;
    label.textContent = lv.txt;
    label.style.color = lv.bg;

    if (document.getElementById('inp-pw2').value) validatePw2();
  });

  /* 5. 검사 헬퍼 */
  function fieldWrap(name) {
    return document.querySelector('[data-field="' + name + '"]');
  }
  function setError(field, msgId, msg) {
    const wrap = fieldWrap(field);
    if (wrap) {
      wrap.classList.remove('border-transparent', 'border-success');
      wrap.classList.add('border-danger');
    }
    const el = document.getElementById(msgId);
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function setOk(field, msgId) {
    const wrap = fieldWrap(field);
    if (wrap) {
      wrap.classList.remove('border-danger');
      wrap.classList.remove('border-transparent');
      wrap.classList.add('border-success');
    }
    document.getElementById(msgId).classList.add('hidden');
  }

  /* 6. 검증 */
  function validatePhone() {
    const v = document.getElementById('inp-phone').value.replace(/\D/g, '');
    if (!v)                              { setError('phone','msg-phone','휴대폰번호를 입력해주세요.'); return false; }
    if (!/^01[016789]\d{7,8}$/.test(v))  { setError('phone','msg-phone','올바른 휴대폰번호를 입력해주세요.'); return false; }
    setOk('phone','msg-phone'); return true;
  }
  function validateName() {
    const v = document.getElementById('inp-name').value.trim();
    if (!v) { setError('name','msg-name','이름을 입력해주세요.'); return false; }
    setOk('name','msg-name'); return true;
  }
  function validateBirth() {
    const v = document.getElementById('inp-birth').value.trim();
    const hint = document.getElementById('hint-birth');
    if (!v) { setError('birth','msg-birth','생년월일을 입력해주세요.'); hint.classList.remove('hidden'); return false; }
    if (!/^\d{8}$/.test(v)) { setError('birth','msg-birth','8자리 숫자로 입력해주세요. (예: 19900101)'); return false; }
    const yr = +v.slice(0,4), mo = +v.slice(4,6), dy = +v.slice(6,8);
    const thisYear = new Date().getFullYear();
    if (yr < 1900 || yr > thisYear || mo < 1 || mo > 12 || dy < 1 || dy > 31) {
      setError('birth','msg-birth','올바른 생년월일을 입력해주세요.'); return false;
    }
    hint.classList.add('hidden');
    setOk('birth','msg-birth'); return true;
  }
  function validatePw() {
    const v = document.getElementById('inp-pw').value;
    if (!v)                  { setError('pw','msg-pw','비밀번호를 입력해주세요.'); return false; }
    if (v.length < 8)        { setError('pw','msg-pw','8자 이상 입력해주세요.'); return false; }
    if (!/[a-zA-Z]/.test(v)) { setError('pw','msg-pw','영문자를 포함해야 합니다.'); return false; }
    if (!/[0-9]/.test(v))    { setError('pw','msg-pw','숫자를 포함해야 합니다.'); return false; }
    setOk('pw','msg-pw'); return true;
  }
  function validatePw2() {
    const pw  = document.getElementById('inp-pw').value;
    const pw2 = document.getElementById('inp-pw2').value;
    if (!pw2)       { setError('pw2','msg-pw2','비밀번호 확인을 입력해주세요.'); return false; }
    if (pw !== pw2) { setError('pw2','msg-pw2','비밀번호가 일치하지 않습니다.'); return false; }
    setOk('pw2','msg-pw2'); return true;
  }

  /* 7. blur 검사 */
  document.getElementById('inp-phone').addEventListener('blur', validatePhone);
  document.getElementById('inp-name').addEventListener('blur', validateName);
  document.getElementById('inp-birth').addEventListener('blur', validateBirth);
  document.getElementById('inp-pw').addEventListener('blur', validatePw);
  document.getElementById('inp-pw2').addEventListener('blur', validatePw2);
  document.getElementById('inp-pw2').addEventListener('input', function () {
    if (this.value) validatePw2();
  });

  /* 8. 제출 → 서버 API */
  document.getElementById('signupForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const ok = [validatePhone(), validateName(), validateBirth(), validatePw(), validatePw2()];
    if (!ok.every(Boolean)) return;

    const $btn = document.getElementById('submitBtn');
    const orig = $btn.textContent;
    $btn.disabled = true;
    $btn.textContent = '가입 중...';

    try {
      const res = await fetch('./api/signup.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone:     document.getElementById('inp-phone').value.replace(/\D/g,''),
          name:      document.getElementById('inp-name').value.trim(),
          birthdate: document.getElementById('inp-birth').value.trim(),
          password:  document.getElementById('inp-pw').value,
        }),
        credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        alert(data.error || '회원가입에 실패했습니다.');
        return;
      }
      // 완료 모달 표시
      const $modal = document.getElementById('signupModal');
      $modal.classList.remove('hidden');
      $modal.classList.add('flex');
      document.body.style.overflow = 'hidden';
    } catch (err) {
      alert('네트워크 오류: ' + (err && err.message ? err.message : err));
    } finally {
      $btn.disabled = false;
      $btn.textContent = orig;
    }
  });

})();
</script>

</body>
</html>
